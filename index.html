<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JunkProfit Tracker Pro - Developer Version</title>
  
  <!-- jsPDF library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  
  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="appContainer" class="container">
    <div id="devBanner" class="dev-banner">
      🛠️ DEVELOPER VERSION - No License Required
    </div>
    
    <div class="sidebar">
      <div class="logo">
        <div class="logo-content">
          <div class="logo-icon">💼</div>
          <div class="logo-text">
            <h1>JunkProfit</h1>
            <p>Tracker Pro</p>
          </div>
        </div>
      </div>
      
      <div class="user-info">
        <p>User Mode:</p>
        <strong>Developer</strong>
      </div>
      
      <nav id="nav"></nav>
      
      <div class="sidebar-footer">
        <button class="data-controls-btn" onclick="app.exportData()">
          📥 Export Data
        </button>
        <button class="data-controls-btn" onclick="app.clearData()">
          🗑️ Clear All Data
        </button>
      </div>
    </div>
    
    <div class="main-content" id="mainContent"></div>
  </div>

  <!-- Application JavaScript -->
  <script src="app.js"></script>
</body>
</html>
